on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  checkpatch:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: fetch all commits
        run: git fetch -a origin --unshallow || true
      - name: add upstream
        run: git remote add upstream -f https://gitlab.com/qemu-project/qemu
      - name: checkpatch
        run: ./scripts/checkpatch.pl $(git merge-base upstream/master HEAD)..HEAD

  build-clang:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build_container
        run: ./run.sh amd64 true
      - name: build clang
        run: ./run.sh amd64 ./build.sh clang
      - uses: actions/upload-artifact@v4
        with:
          name: build-clang
          path: build_amd64/

  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build_container
        run: ./run.sh amd64 true
      - name: build opt
        run: ./run.sh amd64 ./build.sh debug
      - uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: build_amd64/

  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build_container
        run: ./run.sh amd64 true
      - name: build opt
        run: ./run.sh amd64 ./build.sh opt
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: build_amd64/

  check-tcg:
    runs-on: ubuntu-latest
    needs: build-debug
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build_container
        run: ./run.sh amd64 true
      - uses: actions/download-artifact@v4
        with:
          name: build-debug
      - name: check-tcg
        run: ./run.sh amd64 make -C build check-tcg

  check-functional:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build_container
        run: ./run.sh amd64 true
      - uses: actions/download-artifact@v4
        with:
          name: build
      - name: check-functional
        run: ./run.sh amd64 make -C build check-functional

  check-avocado:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build_container
        run: ./run.sh amd64 true
      - uses: actions/download-artifact@v4
        with:
          name: build
      - name: check-avocado
        run: ./run.sh amd64 make -C build check-avocado

  check: # Run block, qapi-schema, unit, softfloat, qtest and decodetree tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build_container
        run: ./run.sh amd64 true
      - uses: actions/download-artifact@v4
        with:
          name: build
      - name: check
        run: ./run.sh amd64 make -C build check
